name: TMP digest scan test
# 一次性验证:awk 从默认 imagetools 输出解析 index digest + 扫描 API 是否接受 @sha256: digest 引用。
# 仅 workflow_dispatch(不会自动触发);验证完立即删除,不属于流水线的一部分。
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 20
    env:
      HARBOR_IMAGE: build-harbor.alauda.cn/asm/ansible-operator-plugins/runner-base
      SCAN_API: http://192.168.25.100:8888
      http_proxy: ${{ vars.HTTP_PROXY }}
      https_proxy: ${{ vars.HTTPS_PROXY }}
      no_proxy: ${{ vars.NO_PROXY }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Login Harbor
        uses: docker/login-action@v4
        with:
          registry: build-harbor.alauda.cn
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: 解析 index digest(awk)并按 digest 扫描
        run: |
          set -euo pipefail
          echo "== imagetools inspect 默认输出 =="
          docker buildx imagetools inspect "${HARBOR_IMAGE}:latest"
          echo "== awk 解析 index digest =="
          digest="$(docker buildx imagetools inspect "${HARBOR_IMAGE}:latest" | awk '/^Digest:/{print $2; exit}')"
          echo "解析出的 digest: '${digest}'"
          case "$digest" in
            sha256:*) echo "digest 解析 OK" ;;
            *) echo "digest 解析失败: '${digest}'" >&2; exit 1 ;;
          esac
          echo "== 用 scan-image.sh 按 digest 扫描(验证 API 是否接受 @sha256:) =="
          .github/scripts/scan-image.sh "${HARBOR_IMAGE}@${digest}"
          echo "== scan-image.sh 写入的 GITHUB_OUTPUT =="
          cat "$GITHUB_OUTPUT"
          echo "== 若上面出现 clean=true|false,即证明扫描 API 接受了 digest 引用 =="
